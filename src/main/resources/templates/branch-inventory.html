<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch Inventory — Digital Gold Wallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="dgw-navbar">
    <a th:href="@{/}" class="dgw-navbar-brand">
        <div class="brand-icon">🪙</div>
        <div class="brand-name">Digital <span>Gold</span> Wallet</div>
    </a>
    <div class="dgw-navbar-right">
        <a th:href="@{/vendor-module}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">← Vendor Module</a>
        <a th:href="@{/logout}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">Sign Out</a>
    </div>
</nav>

<div class="dgw-page">

    <div class="dgw-breadcrumb">
        <a th:href="@{/}">Home</a><span class="sep">›</span>
        <a th:href="@{/vendor-module}">Vendor Module</a><span class="sep">›</span>
        <a th:href="@{/branches}">Branches</a><span class="sep">›</span>
        <span class="current">Branch Inventory</span>
    </div>

    <h1 class="page-title" style="font-size:2rem;margin-bottom:0.25rem;">Branch Inventory</h1>
    <p class="page-subtitle" style="margin-bottom:2rem;">
        <span class="method-badge method-GET" style="display:inline-flex;">GET</span>
        &nbsp;/api/v1/branches/<span th:text="${branch.branchId}"></span>/inventory
    </p>

    <!-- INVENTORY STAT -->
    <div id="stat-box" style="margin-bottom:1.5rem;">
        <div class="stat-widget" style="border-color:rgba(212,175,55,0.4);box-shadow:0 0 20px rgba(212,175,55,0.15);">
            <div class="stat-label">Current Physical Gold Inventory</div>
            <div class="stat-value" style="background:linear-gradient(135deg, var(--accent-gold), #fff);-webkit-background-clip:text;background-clip:text;color:transparent;" th:text="${branch.quantity + 'g'}">0g</div>
            <div class="stat-unit" style="margin-top:1rem;color:var(--text-muted);">
                Branch ID: <strong style="color:var(--text-primary);" th:text="${branch.branchId}">—</strong>
                <span style="margin:0 0.5rem;">|</span>
                Vendor: <strong style="color:var(--text-primary);" th:text="${branch.vendor != null ? branch.vendor.vendorName : 'N/A'}">—</strong>
            </div>
        </div>
    </div>

    <div class="action-bar" style="margin-top:2rem;">
        <a th:href="@{/branches/view/{id}(id=${branch.branchId})}" class="btn-ghost">View Branch Details</a>
        <a th:href="@{/vendor-module}" class="btn-ghost">← Back to Module</a>
    </div>

</div>

</body>
</html>
