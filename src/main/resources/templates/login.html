<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Digital Gold Wallet</title>
    <meta name="description" content="Sign in to the Digital Gold Wallet system">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .hint-list {
            margin-top: 1.5rem;
            padding: 1rem 1.25rem;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
        }
        .hint-list p {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .hint-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.35rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .hint-row:last-child { border-bottom: none; }
        .hint-user {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .hint-module {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.15rem 0.6rem;
            border-radius: 100px;
        }
        .hm-user    { background: rgba(79,142,247,0.15); color: #4f8ef7; }
        .hm-vendor  { background: rgba(62,207,142,0.15); color: #3ecf8e; }
        .hm-gold    { background: rgba(212,168,67,0.15);  color: #d4a843; }
        .hm-payment { background: rgba(240,93,122,0.15);  color: #f05d7a; }
    </style>
</head>

<body>

<div class="login-page">

    <div class="login-card">

        <!-- LOGO -->
        <div class="login-logo">
            <div class="logo-icon">🪙</div>
            <h1>Digital Gold Wallet</h1>
            <p>Sign in to access your module</p>
        </div>

        <!-- ERROR -->
        <div th:if="${param.error}" class="alert-box alert-error show" style="margin-bottom:1.25rem;">
            <span class="alert-icon">⚠️</span>
            <span>Invalid username or password. Please try again.</span>
        </div>

        <!-- LOGOUT -->
        <div th:if="${param.logout}" class="alert-box alert-success show" style="margin-bottom:1.25rem;">
            <span class="alert-icon">✓</span>
            <span>You have been signed out successfully.</span>
        </div>

        <!-- FORM -->
        <form id="login-form" method="post" th:action="@{/login}" class="dgw-form">

            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-control"
                    placeholder="Enter your username"
                    required
                    autocomplete="username"
                    autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password">
            </div>

            <button type="submit" class="btn-gold" style="width:100%; justify-content:center; margin-top:0.5rem;">
                Sign In →
            </button>

        </form>

        <!-- TEAM HINTS -->
        <div class="hint-list">
            <p>Team Access</p>
            <div class="hint-row">
                <span class="hint-user">Varsha Karthikeyan</span>
                <span class="hint-module hm-user">User Module</span>
            </div>
            <div class="hint-row">
                <span class="hint-user">Sparsh</span>
                <span class="hint-module hm-vendor">Vendor Module</span>
            </div>
            <div class="hint-row">
                <span class="hint-user">Mrugan</span>
                <span class="hint-module hm-gold">Gold Module</span>
            </div>
            <div class="hint-row">
                <span class="hint-user">Tanmay</span>
                <span class="hint-module hm-payment">Payment Module</span>
            </div>
        </div>

    </div>

</div>

</body>
</html>
