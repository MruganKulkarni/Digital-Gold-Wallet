<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Physical Gold Orders</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-5">

        <h1 class="text-dark fw-bold mb-5">

            Physical Gold Orders

        </h1>

        <div class="row mb-4">

            <div class="col-md-4 fw-bold">

                User ID:

            </div>

            <div class="col-md-8"
                 th:text="${userId}">

            </div>

        </div>

        <div class="row mb-4">

            <div class="col-md-4 fw-bold">

                Order Status:

            </div>

            <div class="col-md-8">

                Delivered

            </div>

        </div>

        <a
                th:href="@{/gold-module}"

                class="btn btn-secondary">

            Back

        </a>

    </div>

</div>

</body>

</html>
