<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>View Payment</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-5">

        <h1 class="text-warning fw-bold mb-5">

            Payment Details

        </h1>

        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                Payment ID:

            </div>

            <div class="col-md-8"
                 th:text="${payment.paymentId}">

            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                User ID:

            </div>

            <div class="col-md-8"
                 th:text="${payment.user.userId}">

            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                Amount:

            </div>

            <div class="col-md-8"
                 th:text="${payment.amount}">

            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                Payment Method:

            </div>

            <div class="col-md-8"
                 th:text="${payment.paymentMethod}">

            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                Transaction Type:

            </div>

            <div class="col-md-8"
                 th:text="${payment.transactionType}">

            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                Payment Status:

            </div>

            <div class="col-md-8"
                 th:text="${payment.paymentStatus}">

            </div>

        </div>

        <div class="row mb-4">

            <div class="col-md-4 fw-bold">

                Created At:

            </div>

            <div class="col-md-8"
                 th:text="${payment.createdAt}">

            </div>

        </div>

        <a
                th:href="@{/payment-module}"

                class="btn btn-secondary">

            Back

        </a>

    </div>

</div>

</body>

</html>
