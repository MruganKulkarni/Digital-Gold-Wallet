<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Payment — Digital Gold Wallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="dgw-navbar">
    <a th:href="@{/}" class="dgw-navbar-brand">
        <div class="brand-icon">🪙</div>
        <div class="brand-name">Digital <span>Gold</span> Wallet</div>
    </a>
    <div class="dgw-navbar-right">
        <a th:href="@{/payment-module}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">← Payment Module</a>
        <a th:href="@{/logout}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">Sign Out</a>
    </div>
</nav>

<div class="dgw-page" style="max-width:680px;">

    <div class="dgw-breadcrumb">
        <a th:href="@{/}">Home</a><span class="sep">›</span>
        <a th:href="@{/payment-module}">Payment Module</a><span class="sep">›</span>
        <span class="current">Payment Details</span>
    </div>

    <h1 class="page-title" style="font-size:2rem;margin-bottom:0.25rem;">Payment Details</h1>
    <p class="page-subtitle" style="margin-bottom:2rem;">
        <span class="method-badge method-GET" style="display:inline-flex;">GET</span>
        &nbsp;/api/v1/payments/<span th:text="${paymentId}"></span>
    </p>

    <div id="alert-error" class="alert-box alert-error" style="margin-bottom:1.5rem;"></div>

    <div id="loading" style="text-align:center;padding:3rem;color:var(--text-muted);">
        <div class="spinner show" style="margin:0 auto;"></div>
        <p style="margin-top:1rem;">Loading payment…</p>
    </div>

    <div id="result-container" class="dgw-card" style="display:none;">
        <div class="result-row">
            <span class="result-label">Payment ID</span>
            <span class="result-value" id="r-paymentId">—</span>
        </div>
        <div class="result-row">
            <span class="result-label">User ID</span>
            <span class="result-value" id="r-userId">—</span>
        </div>
        <div class="result-row">
            <span class="result-label">Amount</span>
            <span class="result-value" style="color:var(--accent-payment);font-weight:700;" id="r-amount">—</span>
        </div>
        <div class="result-row">
            <span class="result-label">Payment Method</span>
            <span class="result-value" id="r-paymentMethod">—</span>
        </div>
        <div class="result-row">
            <span class="result-label">Transaction Type</span>
            <span class="result-value" id="r-transactionType">—</span>
        </div>
        <div class="result-row">
            <span class="result-label">Status</span>
            <span class="result-value" id="r-status">—</span>
        </div>
        <div class="result-row">
            <span class="result-label">Created At</span>
            <span class="result-value" id="r-createdAt">—</span>
        </div>
    </div>

    <div class="action-bar" style="margin-top:2rem;">
        <a th:href="@{/payment-module}" class="btn-ghost">← Back to Module</a>
    </div>

</div>

<script th:inline="javascript">
    const paymentId = [[${paymentId}]];

    async function loadPayment() {
        const errorBox = document.getElementById('alert-error');
        try {
            const resp = await fetch('/api/v1/payments/' + paymentId);
            const data = await resp.json();
            document.getElementById('loading').style.display = 'none';

            if (!resp.ok) {
                showError(errorBox, data.message || data.error || 'Payment not found.');
                return;
            }

            document.getElementById('r-paymentId').textContent = data.paymentId ?? '—';
            document.getElementById('r-userId').textContent    = (data.user && data.user.userId) ? data.user.userId : '—';
            document.getElementById('r-amount').textContent    = data.amount ?? '—';
            document.getElementById('r-paymentMethod').textContent = data.paymentMethod ?? '—';
            document.getElementById('r-transactionType').textContent = data.transactionType ?? '—';
            document.getElementById('r-status').textContent    = data.paymentStatus ?? '—';
            document.getElementById('r-createdAt').textContent = formatDate(data.createdAt);
            document.getElementById('result-container').style.display = 'block';

        } catch(e) {
            document.getElementById('loading').style.display = 'none';
            showError(errorBox, 'Network error — could not reach the server.');
        }
    }

    function showError(box, msg) {
        box.innerHTML = '<span class="alert-icon">⚠️</span><span>' + msg + '</span>';
        box.classList.add('show');
    }
    function formatDate(dt) {
        if (!dt) return '—';
        return new Date(dt).toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' });
    }

    loadPayment();
</script>

</body>
</html>
