<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Branch — Digital Gold Wallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="dgw-navbar">
    <a th:href="@{/}" class="dgw-navbar-brand">
        <div class="brand-icon">🪙</div>
        <div class="brand-name">Digital <span>Gold</span> Wallet</div>
    </a>
    <div class="dgw-navbar-right">
        <a th:href="@{/vendor-module}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">← Vendor Module</a>
        <a th:href="@{/logout}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">Sign Out</a>
    </div>
</nav>

<div class="dgw-page" style="max-width:640px;">

    <div class="dgw-breadcrumb">
        <a th:href="@{/}">Home</a><span class="sep">›</span>
        <a th:href="@{/vendor-module}">Vendor Module</a><span class="sep">›</span>
        <span class="current">Create Branch</span>
    </div>

    <h1 class="page-title" style="font-size:2rem;margin-bottom:0.25rem;">Create Branch</h1>
    <p class="page-subtitle" style="margin-bottom:2rem;">
        <span class="method-badge method-POST" style="display:inline-flex;">POST</span>
        &nbsp;/api/v1/vendors/{vId}/branches
    </p>

    <div class="dgw-card">

        <div id="alert-error" class="alert-box alert-error" style="margin-bottom:1.25rem;"></div>

        <form id="create-branch-form" class="dgw-form" onsubmit="submitCreateBranch(event)">

            <div class="form-group">
                <label class="form-label" for="vendorId">Vendor ID *</label>
                <input type="number" id="vendorId" class="form-control" placeholder="e.g. 1" min="1" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="addressId">Address ID *</label>
                <input type="number" id="addressId" class="form-control" placeholder="e.g. 2" min="1" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="quantity">Initial Gold Inventory (g) *</label>
                <input type="number" id="quantity" class="form-control" placeholder="e.g. 500.00" step="0.01" min="0" required>
            </div>

            <div class="action-bar" style="margin-top:1rem;">
                <button type="submit" class="btn-gold">
                    <span id="btn-text">Create Branch</span>
                    <span class="spinner" id="spinner"></span>
                </button>
                <a th:href="@{/branches}" class="btn-ghost">Cancel</a>
            </div>

        </form>

        <div id="result-container" class="result-container" style="margin-top:2rem;">
            <h3 style="font-size:1rem;font-weight:700;color:#3ecf8e;margin-bottom:1rem;">
                ✓ Branch Created Successfully
            </h3>
            <div class="result-card">
                <div class="result-row">
                    <span class="result-label">Branch ID</span>
                    <span class="result-value" id="r-branchId" style="font-weight:700;">—</span>
                </div>
                <div class="result-row">
                    <span class="result-label">Vendor</span>
                    <span class="result-value" id="r-vendor">—</span>
                </div>
                <div class="result-row">
                    <span class="result-label">Inventory</span>
                    <span class="result-value" id="r-inventory" style="color:var(--accent-gold);font-weight:700;">—</span>
                </div>
            </div>
            <div style="margin-top:1.5rem;">
                <a th:href="@{/branches}" class="btn-ghost" style="width:100%;justify-content:center;">Go to All Branches →</a>
            </div>
        </div>

    </div>

</div>

<script>
async function submitCreateBranch(e) {
    e.preventDefault();
    const errorBox  = document.getElementById('alert-error');
    const resultBox = document.getElementById('result-container');
    const spinner   = document.getElementById('spinner');
    const btnText   = document.getElementById('btn-text');

    errorBox.classList.remove('show');
    resultBox.classList.remove('show');
    spinner.classList.add('show');
    btnText.textContent = 'Processing…';

    const vId = document.getElementById('vendorId').value;
    const payload = {
        vendorId: parseInt(vId),
        addressId: parseInt(document.getElementById('addressId').value),
        quantity: parseFloat(document.getElementById('quantity').value)
    };

    try {
        const resp = await fetch('/api/v1/vendors/' + vId + '/branches', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await resp.json();
        if (!resp.ok) {
            let msg = data.message || data.error || 'Failed to create branch.';
            if (data.errors && typeof data.errors === 'object') {
                msg = Object.values(data.errors).join(', ');
            }
            showError(errorBox, msg);
        } else {
            document.getElementById('r-branchId').textContent = data.branchId ?? '—';
            document.getElementById('r-vendor').textContent   = (data.vendor && data.vendor.vendorName) ? data.vendor.vendorName : ('ID ' + vId);
            document.getElementById('r-inventory').textContent  = (data.quantity ?? '0') + 'g';
            resultBox.classList.add('show');
            document.getElementById('create-branch-form').style.display = 'none';
        }
    } catch(err) {
        showError(errorBox, 'Network error — could not reach the server.');
    } finally {
        spinner.classList.remove('show');
        btnText.textContent = 'Create Branch';
    }
}

function showError(box, msg) {
    box.innerHTML = '<span class="alert-icon">⚠️</span><span>' + msg + '</span>';
    box.classList.add('show');
}
</script>

</body>
</html>
