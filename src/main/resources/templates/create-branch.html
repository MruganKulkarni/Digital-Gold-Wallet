<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Create Branch</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-5">

        <h1 class="text-success fw-bold mb-4">

            Create Branch

        </h1>

        <form
                th:action="@{/branches/save}"
                method="post">

            <div class="mb-3">

                <label class="form-label">

                    Vendor ID

                </label>

                <input
                        type="number"
                        name="vendorId"
                        class="form-control"
                        required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Address ID

                </label>

                <input
                        type="number"
                        name="addressId"
                        class="form-control"
                        required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Quantity

                </label>

                <input
                        type="number"
                        name="quantity"
                        class="form-control"
                        required>

            </div>

            <button
                    type="submit"
                    class="btn btn-success">

                Save Branch

            </button>

            <a
                    th:href="@{/vendor-module}"
                    class="btn btn-secondary">

                Back

            </a>

        </form>

    </div>

</div>

</body>

</html>
