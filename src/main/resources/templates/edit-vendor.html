<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Vendor — Digital Gold Wallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="dgw-navbar">
    <a th:href="@{/}" class="dgw-navbar-brand">
        <div class="brand-icon">🪙</div>
        <div class="brand-name">Digital <span>Gold</span> Wallet</div>
    </a>
    <div class="dgw-navbar-right">
        <a th:href="@{/vendor-module}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">← Vendor Module</a>
        <a th:href="@{/logout}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">Sign Out</a>
    </div>
</nav>

<div class="dgw-page" style="max-width:680px;">

    <div class="dgw-breadcrumb">
        <a th:href="@{/}">Home</a><span class="sep">›</span>
        <a th:href="@{/vendor-module}">Vendor Module</a><span class="sep">›</span>
        <a th:href="@{/vendors}">Vendors</a><span class="sep">›</span>
        <span class="current">Edit Vendor</span>
    </div>

    <h1 class="page-title" style="font-size:2rem;margin-bottom:0.25rem;">Edit Vendor</h1>
    <p class="page-subtitle" style="margin-bottom:2rem;">
        <span class="method-badge method-PUT" style="display:inline-flex;">PUT</span>
        &nbsp;/api/v1/vendors/<span th:text="${vendor.vendorId}"></span>
    </p>

    <div class="dgw-card">

        <div id="alert-error" class="alert-box alert-error" style="margin-bottom:1.25rem;"></div>

        <form id="edit-vendor-form" class="dgw-form" onsubmit="submitEditVendor(event)">

            <div class="form-group">
                <label class="form-label" for="vendorName">Vendor Name *</label>
                <input type="text" id="vendorName" class="form-control" th:value="${vendor.vendorName}" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <textarea id="description" class="form-control" rows="2" th:text="${vendor.description}"></textarea>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label class="form-label" for="contactPersonName">Contact Person</label>
                    <input type="text" id="contactPersonName" class="form-control" th:value="${vendor.contactPersonName}">
                </div>
                <div class="form-group">
                    <label class="form-label" for="contactEmail">Contact Email</label>
                    <input type="email" id="contactEmail" class="form-control" th:value="${vendor.contactEmail}">
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label class="form-label" for="contactPhone">Contact Phone</label>
                    <input type="text" id="contactPhone" class="form-control" th:value="${vendor.contactPhone}">
                </div>
                <div class="form-group">
                    <label class="form-label" for="websiteUrl">Website URL</label>
                    <input type="url" id="websiteUrl" class="form-control" th:value="${vendor.websiteUrl}">
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label class="form-label" for="totalGoldQuantity">Total Gold Quantity (g) *</label>
                    <input type="number" id="totalGoldQuantity" class="form-control" th:value="${vendor.totalGoldQuantity}" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="currentGoldPrice">Gold Price (₹/g) *</label>
                    <input type="number" id="currentGoldPrice" class="form-control" th:value="${vendor.currentGoldPrice}" step="0.01" min="0.01" required>
                </div>
            </div>

            <div class="action-bar" style="margin-top:1rem;">
                <button type="submit" class="btn-success-dgw" style="border-color:rgba(212,175,55,0.4);color:var(--accent-vendor);">
                    <span id="btn-text">Update Vendor</span>
                    <span class="spinner" id="spinner"></span>
                </button>
                <a th:href="@{/vendors}" class="btn-ghost">Cancel</a>
            </div>

        </form>

        <div id="result-container" class="result-container" style="margin-top:2rem;">
            <h3 style="font-size:1rem;font-weight:700;color:#3ecf8e;margin-bottom:1rem;">
                ✓ Vendor Updated Successfully
            </h3>
            <div style="margin-top:1.5rem;">
                <a th:href="@{/vendors/view/{id}(id=${vendor.vendorId})}" class="btn-ghost" style="width:100%;justify-content:center;">View Vendor →</a>
            </div>
        </div>

    </div>

</div>

<script th:inline="javascript">
const vendorId = [[${vendor.vendorId}]];

async function submitEditVendor(e) {
    e.preventDefault();
    const errorBox  = document.getElementById('alert-error');
    const resultBox = document.getElementById('result-container');
    const spinner   = document.getElementById('spinner');
    const btnText   = document.getElementById('btn-text');

    errorBox.classList.remove('show');
    resultBox.classList.remove('show');
    spinner.classList.add('show');
    btnText.textContent = 'Updating…';

    const payload = {
        vendorName: document.getElementById('vendorName').value,
        description: document.getElementById('description').value,
        contactPersonName: document.getElementById('contactPersonName').value,
        contactEmail: document.getElementById('contactEmail').value,
        contactPhone: document.getElementById('contactPhone').value,
        websiteUrl: document.getElementById('websiteUrl').value,
        totalGoldQuantity: parseFloat(document.getElementById('totalGoldQuantity').value),
        currentGoldPrice: parseFloat(document.getElementById('currentGoldPrice').value)
    };

    try {
        const resp = await fetch('/api/v1/vendors/' + vendorId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await resp.json();
        if (!resp.ok) {
            let msg = data.message || data.error || 'Failed to update vendor.';
            if (data.errors && typeof data.errors === 'object') {
                msg = Object.values(data.errors).join(', ');
            }
            showError(errorBox, msg);
        } else {
            resultBox.classList.add('show');
            document.getElementById('edit-vendor-form').style.display = 'none';
        }
    } catch(err) {
        showError(errorBox, 'Network error — could not reach the server.');
    } finally {
        spinner.classList.remove('show');
        btnText.textContent = 'Update Vendor';
    }
}

function showError(box, msg) {
    box.innerHTML = '<span class="alert-icon">⚠️</span><span>' + msg + '</span>';
    box.classList.add('show');
}
</script>

</body>
</html>
