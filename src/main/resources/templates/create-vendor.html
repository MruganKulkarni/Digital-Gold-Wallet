<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Create Vendor</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-5">

        <h1 class="text-primary fw-bold mb-4">

            Create Vendor

        </h1>

        <form
                th:action="@{/vendors/save}"
                method="post">

            <div class="mb-3">

                <label class="form-label">
                    Vendor Name
                </label>

                <input
                        type="text"
                        name="vendorName"
                        class="form-control"
                        required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Description
                </label>

                <textarea
                        name="description"
                        class="form-control"></textarea>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Contact Person
                </label>

                <input
                        type="text"
                        name="contactPersonName"
                        class="form-control">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Contact Email
                </label>

                <input
                        type="email"
                        name="contactEmail"
                        class="form-control">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Contact Phone
                </label>

                <input
                        type="text"
                        name="contactPhone"
                        class="form-control">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Website URL
                </label>

                <input
                        type="text"
                        name="websiteUrl"
                        class="form-control">

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Total Gold Quantity
                </label>

                <input
                        type="number"
                        name="totalGoldQuantity"
                        class="form-control">

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Current Gold Price
                </label>

                <input
                        type="number"
                        step="0.01"
                        name="currentGoldPrice"
                        class="form-control">

            </div>

            <button
                    type="submit"
                    class="btn btn-success">

                Save Vendor

            </button>

            <a
                    th:href="@{/vendor-module}"
                    class="btn btn-secondary">

                Back

            </a>

        </form>

    </div>

</div>

</body>

</html>
