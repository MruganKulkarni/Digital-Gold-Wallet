<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>All Users</title>

    <!-- Bootstrap -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h1 class="text-primary">

            All Users

        </h1>

        <!-- CREATE BUTTON -->
        <a
                th:href="@{/users/create}"

                class="btn btn-success">

            Create User

        </a>

    </div>

    <!-- USER TABLE -->
    <div class="card shadow-lg p-4">

        <table class="table table-bordered table-hover">

            <thead class="table-dark">

            <tr>

                <th>ID</th>

                <th>Name</th>

                <th>Email</th>

                <th>Balance</th>

                <th>Actions</th>

            </tr>

            </thead>

            <tbody>

            <!-- LOOP USERS -->
            <tr
                    th:each="user : ${users}"

                    class="data-row">

                <td th:text="${user.userId}"></td>

                <td th:text="${user.name}"></td>

                <td th:text="${user.email}"></td>

                <td th:text="${user.balance}"></td>

                <td>

                    <!-- DELETE BUTTON -->
                    <a
                            th:href="@{/users/delete/{id}(id=${user.userId})}"

                            class="btn btn-danger btn-sm">

                        Delete

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

        <!-- ========================================================= -->
        <!-- PAGINATION -->
        <!-- ========================================================= -->

        <div class="text-center mt-4">

            <button
                    onclick="previousPage()"

                    class="btn btn-dark">

                Previous

            </button>

            <span
                    id="pageNumber"

                    class="mx-3 fw-bold">

            </span>

            <button
                    onclick="nextPage()"

                    class="btn btn-dark">

                Next

            </button>

        </div>

    </div>

    <!-- BACK BUTTON -->
    <div class="mt-4">

        <a
                th:href="@{/user-module}"

                class="btn btn-secondary">

            Back To Module

        </a>

    </div>

</div>

<!-- ========================================================= -->
<!-- PAGINATION SCRIPT -->
<!-- ========================================================= -->

<script>

    let currentPage = 1;

    let rowsPerPage = 10;

    let rows =
        document.querySelectorAll(
            ".data-row"
        );

    let totalPages =
        Math.ceil(
            rows.length / rowsPerPage
        );

    function showPage(page) {

        currentPage = page;

        let start =
            (page - 1) * rowsPerPage;

        let end =
            start + rowsPerPage;

        rows.forEach((row, index) => {

            if (
                index >= start &&
                index < end
            ) {

                row.style.display = "";

            } else {

                row.style.display = "none";
            }
        });

        document.getElementById(
            "pageNumber"
        ).innerText =
            "Page " + currentPage +
            " of " + totalPages;
    }

    function nextPage() {

        if (
            currentPage < totalPages
        ) {

            showPage(
                currentPage + 1
            );
        }
    }

    function previousPage() {

        if (
            currentPage > 1
        ) {

            showPage(
                currentPage - 1
            );
        }
    }

    showPage(1);

</script>

</body>

</html>
