<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Users — Digital Gold Wallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="dgw-navbar">
    <a th:href="@{/}" class="dgw-navbar-brand">
        <div class="brand-icon">🪙</div>
        <div class="brand-name">Digital <span>Gold</span> Wallet</div>
    </a>
    <div class="dgw-navbar-right">
        <a th:href="@{/user-module}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">← User Module</a>
        <a th:href="@{/logout}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">Sign Out</a>
    </div>
</nav>

<div class="dgw-page">

    <div class="dgw-breadcrumb">
        <a th:href="@{/}">Home</a><span class="sep">›</span>
        <a th:href="@{/user-module}">User Module</a><span class="sep">›</span>
        <span class="current">All Users</span>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:2rem; flex-wrap:wrap; gap:1rem;">
        <div>
            <h1 class="page-title" style="font-size:2rem;margin-bottom:0.25rem;">All Users</h1>
            <p class="page-subtitle">
                <span class="method-badge method-GET" style="display:inline-flex;">GET</span>
                &nbsp;/users
            </p>
        </div>
        <a th:href="@{/users/create}" class="btn-gold" style="background:var(--accent-user);color:#fff;">
            + Create User
        </a>
    </div>

    <div class="dgw-card" style="padding:0;overflow:hidden;">
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Balance</th>
                    <th style="text-align:right;">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.userId}"></td>
                    <td th:text="${user.name}" style="font-weight:600;color:var(--text-primary);"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${'₹' + user.balance}" style="color:var(--accent-vendor);font-weight:700;"></td>
                    <td style="text-align:right; white-space:nowrap;">
                        <a th:href="@{/users/view(id=${user.userId})}" class="btn-ghost" style="padding:0.4rem 0.75rem;font-size:0.75rem;">View</a>
                        <a th:href="@{/users/edit(id=${user.userId})}" class="btn-ghost" style="padding:0.4rem 0.75rem;font-size:0.75rem;border-color:rgba(62,207,142,0.4);color:var(--accent-vendor);">Edit</a>
                        <button th:onclick="'deleteUser(' + ${user.userId} + ')'" class="btn-danger-dgw" style="padding:0.4rem 0.75rem;font-size:0.75rem;">Delete</button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="5" style="text-align:center;padding:3rem;color:var(--text-muted);">
                        No users found in the system.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    async function deleteUser(id) {
        if (!confirm('Are you sure you want to delete User ' + id + '?')) return;
        try {
            const resp = await fetch('/api/v1/users/' + id, { method: 'DELETE' });
            if (resp.ok) {
                window.location.reload();
            } else {
                const data = await resp.json();
                alert('Failed to delete user: ' + (data.message || data.error));
            }
        } catch (e) {
            alert('Network error during deletion.');
        }
    }
</script>

</body>
</html>
