<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Payment History</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-dark fw-bold mb-4">

        Payment History

    </h1>

    <div class="card shadow-lg p-4">

        <table class="table table-bordered">

            <thead class="table-dark">

            <tr>

                <th>Payment ID</th>

                <th>User ID</th>

                <th>Amount</th>

                <th>Payment Method</th>

                <th>Transaction Type</th>

                <th>Status</th>

                <th>Created At</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="payment : ${payments}">

                <td th:text="${payment.paymentId}"></td>

                <td th:text="${payment.user.userId}"></td>

                <td th:text="${payment.amount}"></td>

                <td th:text="${payment.paymentMethod}"></td>

                <td th:text="${payment.transactionType}"></td>

                <td th:text="${payment.paymentStatus}"></td>

                <td th:text="${payment.createdAt}"></td>

            </tr>

            </tbody>

        </table>

        <a
                th:href="@{/payment-module}"

                class="btn btn-secondary">

            Back

        </a>

    </div>

</div>

</body>

</html>
