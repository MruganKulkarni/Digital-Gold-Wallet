<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User — Digital Gold Wallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="dgw-navbar">
    <a th:href="@{/}" class="dgw-navbar-brand">
        <div class="brand-icon">🪙</div>
        <div class="brand-name">Digital <span>Gold</span> Wallet</div>
    </a>
    <div class="dgw-navbar-right">
        <a th:href="@{/user-module}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">← User Module</a>
        <a th:href="@{/logout}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">Sign Out</a>
    </div>
</nav>

<div class="dgw-page" style="max-width:640px;">

    <div class="dgw-breadcrumb">
        <a th:href="@{/}">Home</a><span class="sep">›</span>
        <a th:href="@{/user-module}">User Module</a><span class="sep">›</span>
        <span class="current">Create User</span>
    </div>

    <h1 class="page-title" style="font-size:2rem;margin-bottom:0.25rem;">Create User</h1>
    <p class="page-subtitle" style="margin-bottom:2rem;">
        <span class="method-badge method-POST" style="display:inline-flex;">POST</span>
        &nbsp;/api/v1/users
    </p>

    <div class="dgw-card">

        <div id="alert-error" class="alert-box alert-error" style="margin-bottom:1.25rem;"></div>

        <form id="create-user-form" class="dgw-form" onsubmit="submitCreateUser(event)">

            <div class="form-group">
                <label class="form-label" for="name">Name *</label>
                <input type="text" id="name" class="form-control" placeholder="e.g. John Doe" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email *</label>
                <input type="email" id="email" class="form-control" placeholder="e.g. john@example.com" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="balance">Starting Balance *</label>
                <input type="number" id="balance" class="form-control" placeholder="e.g. 0.00" step="0.01" min="0" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="addressId">Address ID *</label>
                <input type="number" id="addressId" class="form-control" placeholder="e.g. 1" min="1" required>
            </div>

            <div class="action-bar" style="margin-top:0;">
                <button type="submit" class="btn-gold" style="background:var(--accent-user);color:#fff;">
                    <span id="btn-text">Create User</span>
                    <span class="spinner" id="spinner"></span>
                </button>
                <a th:href="@{/users}" class="btn-ghost">Cancel</a>
            </div>

        </form>

        <div id="result-container" class="result-container" style="margin-top:2rem;">
            <h3 style="font-size:1rem;font-weight:700;color:#3ecf8e;margin-bottom:1rem;">
                ✓ User Created Successfully
            </h3>
            <div class="result-card">
                <div class="result-row">
                    <span class="result-label">User ID</span>
                    <span class="result-value" id="r-userId">—</span>
                </div>
                <div class="result-row">
                    <span class="result-label">Name</span>
                    <span class="result-value" id="r-name">—</span>
                </div>
                <div class="result-row">
                    <span class="result-label">Email</span>
                    <span class="result-value" id="r-email">—</span>
                </div>
                <div class="result-row">
                    <span class="result-label">Address</span>
                    <span class="result-value" id="r-address">—</span>
                </div>
            </div>
            <div style="margin-top:1.5rem;">
                <a th:href="@{/users}" class="btn-ghost" style="width:100%;justify-content:center;">Go to All Users →</a>
            </div>
        </div>

    </div>

</div>

<script>
async function submitCreateUser(e) {
    e.preventDefault();
    const errorBox  = document.getElementById('alert-error');
    const resultBox = document.getElementById('result-container');
    const spinner   = document.getElementById('spinner');
    const btnText   = document.getElementById('btn-text');

    errorBox.classList.remove('show');
    resultBox.classList.remove('show');
    spinner.classList.add('show');
    btnText.textContent = 'Processing…';

    const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        balance: parseFloat(document.getElementById('balance').value),
        addressId: parseInt(document.getElementById('addressId').value)
    };

    try {
        const resp = await fetch('/api/v1/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await resp.json();
        if (!resp.ok) {
            let msg = data.message || data.error || 'Failed to create user.';
            if (data.errors && typeof data.errors === 'object') {
                msg = Object.values(data.errors).join(', ');
            }
            showError(errorBox, msg);
        } else {
            document.getElementById('r-userId').textContent = data.userId ?? '—';
            document.getElementById('r-name').textContent   = data.name ?? '—';
            document.getElementById('r-email').textContent  = data.email ?? '—';
            if (data.address) {
                document.getElementById('r-address').textContent = `${data.address.street}, ${data.address.city}`;
            } else {
                document.getElementById('r-address').textContent = '—';
            }
            resultBox.classList.add('show');
            document.getElementById('create-user-form').style.display = 'none';
        }
    } catch(err) {
        showError(errorBox, 'Network error — could not reach the server.');
    } finally {
        spinner.classList.remove('show');
        btnText.textContent = 'Create User';
    }
}

function showError(box, msg) {
    box.innerHTML = '<span class="alert-icon">⚠️</span><span>' + msg + '</span>';
    box.classList.add('show');
}
</script>

</body>
</html>
