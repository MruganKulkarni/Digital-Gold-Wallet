<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Create User</title>

    <!-- Bootstrap -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- HEADER -->
    <h1 class="text-primary mb-4">

        Create User

    </h1>

    <!-- FORM -->
    <div class="card shadow-lg p-4">

        <form
                th:action="@{/users/save}"

                th:object="${userRequestDto}"

                method="post">

            <!-- NAME -->
            <div class="mb-3">

                <label class="form-label">

                    Name

                </label>

                <input
                        type="text"

                        th:field="*{name}"

                        class="form-control">

            </div>

            <!-- EMAIL -->
            <div class="mb-3">

                <label class="form-label">

                    Email

                </label>

                <input
                        type="email"

                        th:field="*{email}"

                        class="form-control">

            </div>





            <!-- BALANCE -->
            <div class="mb-3">

                <label class="form-label">

                    Balance

                </label>

                <input
                        type="number"

                        th:field="*{balance}"

                        class="form-control">

            </div>

            <!-- ADDRESS ID -->
            <div class="mb-3">

                <label class="form-label">

                    Address ID

                </label>

                <input
                        type="number"

                        th:field="*{addressId}"

                        class="form-control">

            </div>

            <!-- SUBMIT BUTTON -->
            <button
                    type="submit"

                    class="btn btn-primary">

                Save User

            </button>

        </form>

    </div>

    <!-- BACK BUTTON -->
    <div class="mt-4">

        <a
                th:href="@{/users}"

                class="btn btn-secondary">

            Back To Users

        </a>

    </div>

</div>

</body>

</html>
