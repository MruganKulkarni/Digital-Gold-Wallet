<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Branch Gold Holdings</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-5">

        <h1 class="text-secondary fw-bold mb-5">

            Branch Gold Holdings

        </h1>

        <div class="row mb-4">

            <div class="col-md-4 fw-bold">

                Branch ID:

            </div>

            <div class="col-md-8"
                 th:text="${branchId}">

            </div>

        </div>

        <div class="row mb-4">

            <div class="col-md-4 fw-bold">

                Gold Quantity:

            </div>

            <div class="col-md-8">

                1000 grams

            </div>

        </div>

        <a
                th:href="@{/gold-module}"

                class="btn btn-secondary">

            Back

        </a>

    </div>

</div>

</body>

</html>
