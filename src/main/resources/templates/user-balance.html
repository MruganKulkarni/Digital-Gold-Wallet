<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Balance — Digital Gold Wallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="dgw-navbar">
    <a th:href="@{/}" class="dgw-navbar-brand">
        <div class="brand-icon">🪙</div>
        <div class="brand-name">Digital <span>Gold</span> Wallet</div>
    </a>
    <div class="dgw-navbar-right">
        <a th:href="@{/user-module}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">← User Module</a>
        <a th:href="@{/logout}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">Sign Out</a>
    </div>
</nav>

<div class="dgw-page">

    <div class="dgw-breadcrumb">
        <a th:href="@{/}">Home</a><span class="sep">›</span>
        <a th:href="@{/user-module}">User Module</a><span class="sep">›</span>
        <a th:href="@{/users}">Users</a><span class="sep">›</span>
        <span class="current">User Balance</span>
    </div>

    <h1 class="page-title" style="font-size:2rem;margin-bottom:0.25rem;">User Balance</h1>
    <p class="page-subtitle" style="margin-bottom:2rem;">
        <span class="method-badge method-GET" style="display:inline-flex;">GET</span>
        &nbsp;/api/v1/users/<span th:text="${userId}"></span>/balance
    </p>

    <!-- BALANCE STAT -->
    <div id="stat-box" style="margin-bottom:1.5rem;">
        <div class="stat-widget" style="border-color:rgba(79,142,247,0.4);box-shadow:0 0 20px rgba(79,142,247,0.15);">
            <div class="stat-label">Current Balance</div>
            <div class="stat-value" style="background:linear-gradient(135deg, var(--accent-user), #3362bd);-webkit-background-clip:text;background-clip:text;color:transparent;" th:text="${'₹' + balance}">0</div>
            <div class="stat-unit" style="margin-top:1rem;color:var(--text-muted);">
                User ID: <strong style="color:var(--text-primary);" th:text="${userId}">—</strong>
            </div>
        </div>
    </div>

    <div class="action-bar" style="margin-top:2rem;">
        <a th:href="@{/users/view(id=${userId})}" class="btn-ghost">View User Details</a>
        <a th:href="@{/user-module}" class="btn-ghost">← Back to Module</a>
    </div>

</div>

</body>
</html>
