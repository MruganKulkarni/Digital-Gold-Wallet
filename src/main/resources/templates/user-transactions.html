<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Transactions — Digital Gold Wallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="dgw-navbar">
    <a th:href="@{/}" class="dgw-navbar-brand">
        <div class="brand-icon">🪙</div>
        <div class="brand-name">Digital <span>Gold</span> Wallet</div>
    </a>
    <div class="dgw-navbar-right">
        <a th:href="@{/gold-module}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">← Gold Module</a>
        <a th:href="@{/logout}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">Sign Out</a>
    </div>
</nav>

<div class="dgw-page">

    <div class="dgw-breadcrumb">
        <a th:href="@{/}">Home</a><span class="sep">›</span>
        <a th:href="@{/gold-module}">Gold Module</a><span class="sep">›</span>
        <span class="current">User Transactions</span>
    </div>

    <h1 class="page-title" style="font-size:2rem;margin-bottom:0.25rem;">User Transaction History</h1>
    <p class="page-subtitle" style="margin-bottom:2rem;">
        <span class="method-badge method-GET" style="display:inline-flex;">GET</span>
        &nbsp;/api/v1/users/<span th:text="${userId}"></span>/transactions
    </p>

    <div id="alert-error" class="alert-box alert-error" style="margin-bottom:1.5rem;"></div>

    <div id="loading" style="text-align:center;padding:3rem;color:var(--text-muted);">
        <div class="spinner show" style="margin:0 auto;"></div>
        <p style="margin-top:1rem;">Loading transactions…</p>
    </div>

    <div id="table-container" class="dgw-card" style="display:none;padding:0;overflow:hidden;">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Transaction ID</th>
                    <th>Type</th>
                    <th>Quantity (g)</th>
                    <th>Branch ID</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="tx-body"></tbody>
        </table>
    </div>

    <div id="empty-state" style="display:none;text-align:center;padding:3rem;color:var(--text-muted);">
        <div style="font-size:3rem;margin-bottom:1rem;">📋</div>
        <p>No transaction history found for this user.</p>
    </div>

    <div class="action-bar" style="margin-top:2rem;">
        <a th:href="@{/gold-module}" class="btn-ghost">← Back to Module</a>
    </div>

</div>

<script th:inline="javascript">
    const userId = [[${userId}]];

    const typeColor = {
        'BUY':      'var(--accent-vendor)',
        'SELL':     'var(--accent-payment)',
        'CONVERT':  'var(--gold-primary)'
    };

    async function loadTransactions() {
        const errorBox = document.getElementById('alert-error');
        try {
            const resp = await fetch('/api/v1/users/' + userId + '/transactions');
            const data = await resp.json();
            document.getElementById('loading').style.display = 'none';

            if (!resp.ok) {
                showError(errorBox, data.message || data.error || 'Failed to load transactions.');
                return;
            }

            if (!data || data.length === 0) {
                document.getElementById('empty-state').style.display = 'block';
                return;
            }

            const tbody = document.getElementById('tx-body');
            data.forEach(t => {
                const type = (t.transactionType || '').toUpperCase();
                const color = typeColor[type] || 'var(--text-secondary)';
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${t.transactionId ?? '—'}</td>
                    <td><span class="status-badge" style="background:rgba(255,255,255,0.05);color:${color};">${t.transactionType ?? '—'}</span></td>
                    <td style="color:var(--gold-primary);font-weight:700;">${parseFloat(t.quantity||0).toFixed(4)} g</td>
                    <td>${t.branchId ?? '—'}</td>
                    <td>${formatDate(t.createdAt)}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('table-container').style.display = 'block';
        } catch(e) {
            document.getElementById('loading').style.display = 'none';
            showError(errorBox, 'Network error — could not reach the server.');
        }
    }

    function showError(box, msg) {
        box.innerHTML = '<span class="alert-icon">⚠️</span><span>' + msg + '</span>';
        box.classList.add('show');
    }
    function formatDate(dt) {
        if (!dt) return '—';
        return new Date(dt).toLocaleString('en-IN', { dateStyle:'medium', timeStyle:'short' });
    }

    loadTransactions();
</script>

</body>
</html>
