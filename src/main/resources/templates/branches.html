<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Branches</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-primary fw-bold mb-4">

        Branch List

    </h1>

    <div class="card shadow-lg p-4">

        <table class="table table-bordered">

            <thead class="table-dark">

            <tr>

                <th>Branch ID</th>

                <th>Vendor ID</th>

                <th>Address ID</th>

                <th>Quantity</th>

            </tr>

            </thead>

            <tbody>

            <tr
                    th:each="branch : ${branches}"

                    class="data-row">

                <td th:text="${branch.branchId}"></td>

                <td th:text="${branch.vendor.vendorId}"></td>

                <td th:text="${branch.address.addressId}"></td>

                <td th:text="${branch.quantity}"></td>

            </tr>

            </tbody>

        </table>

        <!-- ========================================================= -->
        <!-- PAGINATION -->
        <!-- ========================================================= -->

        <div class="text-center mt-4">

            <button
                    onclick="previousPage()"

                    class="btn btn-dark">

                Previous

            </button>

            <span
                    id="pageNumber"

                    class="mx-3 fw-bold">

            </span>

            <button
                    onclick="nextPage()"

                    class="btn btn-dark">

                Next

            </button>

        </div>

        <div class="mt-3">

            <a
                    th:href="@{/vendor-module}"

                    class="btn btn-secondary">

                Back

            </a>

        </div>

    </div>

</div>

<!-- ========================================================= -->
<!-- PAGINATION SCRIPT -->
<!-- ========================================================= -->

<script>

    let currentPage = 1;

    let rowsPerPage = 10;

    let rows =
        document.querySelectorAll(
            ".data-row"
        );

    let totalPages =
        Math.ceil(
            rows.length / rowsPerPage
        );

    function showPage(page) {

        currentPage = page;

        let start =
            (page - 1) * rowsPerPage;

        let end =
            start + rowsPerPage;

        rows.forEach((row, index) => {

            if (
                index >= start &&
                index < end
            ) {

                row.style.display = "";

            } else {

                row.style.display = "none";
            }
        });

        document.getElementById(
            "pageNumber"
        ).innerText =
            "Page " + currentPage +
            " of " + totalPages;
    }

    function nextPage() {

        if (
            currentPage < totalPages
        ) {

            showPage(
                currentPage + 1
            );
        }
    }

    function previousPage() {

        if (
            currentPage > 1
        ) {

            showPage(
                currentPage - 1
            );
        }
    }

    showPage(1);

</script>

</body>

</html>
