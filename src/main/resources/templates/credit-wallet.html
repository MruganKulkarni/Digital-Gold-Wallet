<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Wallet — Digital Gold Wallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="dgw-navbar">
    <a th:href="@{/}" class="dgw-navbar-brand">
        <div class="brand-icon">🪙</div>
        <div class="brand-name">Digital <span>Gold</span> Wallet</div>
    </a>
    <div class="dgw-navbar-right">
        <a th:href="@{/payment-module}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">← Payment Module</a>
        <a th:href="@{/logout}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">Sign Out</a>
    </div>
</nav>

<div class="dgw-page" style="max-width:640px;">

    <div class="dgw-breadcrumb">
        <a th:href="@{/}">Home</a><span class="sep">›</span>
        <a th:href="@{/payment-module}">Payment Module</a><span class="sep">›</span>
        <span class="current">Credit Wallet</span>
    </div>

    <h1 class="page-title" style="font-size:2rem;margin-bottom:0.25rem;">Credit Wallet</h1>
    <p class="page-subtitle" style="margin-bottom:2rem;">
        <span class="method-badge method-POST" style="display:inline-flex;">POST</span>
        &nbsp;/api/v1/wallets/<span th:text="${userId}"></span>/credit
    </p>

    <div class="dgw-card">

        <div id="alert-error" class="alert-box alert-error" style="margin-bottom:1.25rem;"></div>

        <form id="credit-form" class="dgw-form" onsubmit="submitCredit(event)">

            <div class="form-group">
                <label class="form-label" for="amount">Amount *</label>
                <input type="number" id="amount" class="form-control" placeholder="e.g. 500.00" step="0.01" min="0.1" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="paymentMethod">Payment Method *</label>
                <select id="paymentMethod" class="form-control" required>
                    <option value="" disabled selected>Select a method</option>
                    <option value="Credit Card">Credit Card</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="Google Pay">Google Pay</option>
                    <option value="PhonePe">PhonePe</option>
                </select>
            </div>

            <div class="action-bar" style="margin-top:0;">
                <button type="submit" class="btn-success-dgw" style="background:rgba(62,207,142,0.15);color:#3ecf8e;border-color:rgba(62,207,142,0.3);">
                    <span id="btn-text">Credit Wallet</span>
                    <span class="spinner" id="spinner"></span>
                </button>
                <a th:href="@{/payment-module}" class="btn-ghost">Cancel</a>
            </div>

        </form>

        <!-- RESULT -->
        <div id="result-container" class="result-container" style="margin-top:2rem;">
            <h3 style="font-size:1rem;font-weight:700;color:#3ecf8e;margin-bottom:1rem;">
                ✓ Wallet Credited
            </h3>
            <div class="result-card">
                <div class="result-row">
                    <span class="result-label">Payment ID</span>
                    <span class="result-value" id="r-paymentId">—</span>
                </div>
                <div class="result-row">
                    <span class="result-label">Amount</span>
                    <span class="result-value" style="color:#3ecf8e;font-weight:700;" id="r-amount">—</span>
                </div>
                <div class="result-row">
                    <span class="result-label">Status</span>
                    <span class="result-value" id="r-status">—</span>
                </div>
            </div>
        </div>

    </div>

</div>

<script th:inline="javascript">
    const userId = [[${userId}]];

    async function submitCredit(e) {
        e.preventDefault();
        const errorBox  = document.getElementById('alert-error');
        const resultBox = document.getElementById('result-container');
        const spinner   = document.getElementById('spinner');
        const btnText   = document.getElementById('btn-text');

        errorBox.classList.remove('show');
        resultBox.classList.remove('show');
        spinner.classList.add('show');
        btnText.textContent = 'Processing…';

        const payload = {
            amount: parseFloat(document.getElementById('amount').value),
            paymentMethod: document.getElementById('paymentMethod').value
        };

        try {
            const resp = await fetch('/api/v1/wallets/' + userId + '/credit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await resp.json();
            if (!resp.ok) {
                let msg = data.message || data.error || 'Failed to credit wallet.';
                if (data.errors && typeof data.errors === 'object') {
                    msg = Object.values(data.errors).join(', ');
                }
                showError(errorBox, msg);
            } else {
                document.getElementById('r-paymentId').textContent = data.paymentId ?? '—';
                document.getElementById('r-amount').textContent    = '+' + (data.amount ?? '—');
                document.getElementById('r-status').textContent    = data.paymentStatus ?? '—';
                resultBox.classList.add('show');
                document.getElementById('credit-form').reset();
            }
        } catch(err) {
            showError(errorBox, 'Network error — could not reach the server.');
        } finally {
            spinner.classList.remove('show');
            btnText.textContent = 'Credit Wallet';
        }
    }

    function showError(box, msg) {
        box.innerHTML = '<span class="alert-icon">⚠️</span><span>' + msg + '</span>';
        box.classList.add('show');
    }
</script>

</body>
</html>
