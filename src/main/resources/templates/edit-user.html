<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User — Digital Gold Wallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="dgw-navbar">
    <a th:href="@{/}" class="dgw-navbar-brand">
        <div class="brand-icon">🪙</div>
        <div class="brand-name">Digital <span>Gold</span> Wallet</div>
    </a>
    <div class="dgw-navbar-right">
        <a th:href="@{/user-module}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">← User Module</a>
        <a th:href="@{/logout}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">Sign Out</a>
    </div>
</nav>

<div class="dgw-page" style="max-width:640px;">

    <div class="dgw-breadcrumb">
        <a th:href="@{/}">Home</a><span class="sep">›</span>
        <a th:href="@{/user-module}">User Module</a><span class="sep">›</span>
        <a th:href="@{/users}">Users</a><span class="sep">›</span>
        <span class="current">Edit User</span>
    </div>

    <h1 class="page-title" style="font-size:2rem;margin-bottom:0.25rem;">Edit User</h1>
    <p class="page-subtitle" style="margin-bottom:2rem;">
        <span class="method-badge method-PUT" style="display:inline-flex;">PUT</span>
        &nbsp;/api/v1/users/<span th:text="${userId}"></span>
    </p>

    <div class="dgw-card">

        <div id="alert-error" class="alert-box alert-error" style="margin-bottom:1.25rem;"></div>

        <form id="edit-user-form" class="dgw-form" onsubmit="submitEditUser(event)">

            <div class="form-group">
                <label class="form-label" for="name">Name *</label>
                <input type="text" id="name" class="form-control" th:value="${userRequestDto.name}" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="email">Email *</label>
                <input type="email" id="email" class="form-control" th:value="${userRequestDto.email}" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="balance">Balance *</label>
                <input type="number" id="balance" class="form-control" th:value="${userRequestDto.balance}" step="0.01" min="0" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="addressId">Address ID *</label>
                <input type="number" id="addressId" class="form-control" th:value="${userRequestDto.addressId}" min="1" required>
            </div>

            <div class="action-bar" style="margin-top:0;">
                <button type="submit" class="btn-success-dgw" style="border-color:rgba(62,207,142,0.4);color:var(--accent-vendor);">
                    <span id="btn-text">Update User</span>
                    <span class="spinner" id="spinner"></span>
                </button>
                <a th:href="@{/users}" class="btn-ghost">Cancel</a>
            </div>

        </form>

        <div id="result-container" class="result-container" style="margin-top:2rem;">
            <h3 style="font-size:1rem;font-weight:700;color:#3ecf8e;margin-bottom:1rem;">
                ✓ User Updated Successfully
            </h3>
            <div style="margin-top:1.5rem;">
                <a th:href="@{/users}" class="btn-ghost" style="width:100%;justify-content:center;">Go to All Users →</a>
            </div>
        </div>

    </div>

</div>

<script th:inline="javascript">
const userId = [[${userId}]];

async function submitEditUser(e) {
    e.preventDefault();
    const errorBox  = document.getElementById('alert-error');
    const resultBox = document.getElementById('result-container');
    const spinner   = document.getElementById('spinner');
    const btnText   = document.getElementById('btn-text');

    errorBox.classList.remove('show');
    resultBox.classList.remove('show');
    spinner.classList.add('show');
    btnText.textContent = 'Updating…';

    const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        balance: parseFloat(document.getElementById('balance').value),
        addressId: parseInt(document.getElementById('addressId').value)
    };

    try {
        const resp = await fetch('/api/v1/users/' + userId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await resp.json();
        if (!resp.ok) {
            let msg = data.message || data.error || 'Failed to update user.';
            if (data.errors && typeof data.errors === 'object') {
                msg = Object.values(data.errors).join(', ');
            }
            showError(errorBox, msg);
        } else {
            resultBox.classList.add('show');
            document.getElementById('edit-user-form').style.display = 'none';
        }
    } catch(err) {
        showError(errorBox, 'Network error — could not reach the server.');
    } finally {
        spinner.classList.remove('show');
        btnText.textContent = 'Update User';
    }
}

function showError(box, msg) {
    box.innerHTML = '<span class="alert-icon">⚠️</span><span>' + msg + '</span>';
    box.classList.add('show');
}
</script>

</body>
</html>
