<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit User</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-5">

        <h1 class="text-info mb-4">

            Edit User

        </h1>

        <form
                th:action="@{/users/update/{id}(id=${userId})}"

                th:object="${userRequestDto}"

                method="post">

            <div class="mb-3">

                <label>Name</label>

                <input
                        type="text"

                        th:field="*{name}"

                        class="form-control">

            </div>

            <div class="mb-3">

                <label>Email</label>

                <input
                        type="email"

                        th:field="*{email}"

                        class="form-control">

            </div>

            <div class="mb-3">

                <label>Balance</label>

                <input
                        type="number"

                        th:field="*{balance}"

                        class="form-control">

            </div>

            <div class="mb-3">

                <label>Address ID</label>

                <input
                        type="number"

                        th:field="*{addressId}"

                        class="form-control">

            </div>

            <button
                    type="submit"

                    class="btn btn-info text-white">

                Update User

            </button>

        </form>

    </div>

</div>

</body>

</html>
