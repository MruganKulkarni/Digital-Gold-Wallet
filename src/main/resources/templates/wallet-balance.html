<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet Balance — Digital Gold Wallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="dgw-navbar">
    <a th:href="@{/}" class="dgw-navbar-brand">
        <div class="brand-icon">🪙</div>
        <div class="brand-name">Digital <span>Gold</span> Wallet</div>
    </a>
    <div class="dgw-navbar-right">
        <a th:href="@{/payment-module}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">← Payment Module</a>
        <a th:href="@{/logout}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">Sign Out</a>
    </div>
</nav>

<div class="dgw-page">

    <div class="dgw-breadcrumb">
        <a th:href="@{/}">Home</a><span class="sep">›</span>
        <a th:href="@{/payment-module}">Payment Module</a><span class="sep">›</span>
        <span class="current">Wallet Balance</span>
    </div>

    <h1 class="page-title" style="font-size:2rem;margin-bottom:0.25rem;">Wallet Balance</h1>
    <p class="page-subtitle" style="margin-bottom:2rem;">
        <span class="method-badge method-GET" style="display:inline-flex;">GET</span>
        &nbsp;/api/v1/wallets/<span th:text="${userId}"></span>/balance
    </p>

    <div id="alert-error" class="alert-box alert-error" style="margin-bottom:1.5rem;"></div>

    <div id="loading" style="text-align:center;padding:3rem;color:var(--text-muted);">
        <div class="spinner show" style="margin:0 auto;"></div>
        <p style="margin-top:1rem;">Loading balance…</p>
    </div>

    <!-- BALANCE STAT -->
    <div id="stat-box" style="display:none;margin-bottom:1.5rem;">
        <div class="stat-widget" style="border-color:rgba(62,207,142,0.4);box-shadow:0 0 20px rgba(62,207,142,0.15);">
            <div class="stat-label">Current Balance</div>
            <div class="stat-value" id="total-balance" style="background:linear-gradient(135deg, #3ecf8e, #2ba870);-webkit-background-clip:text;background-clip:text;color:transparent;">0</div>
            <div class="stat-unit" style="margin-top:1rem;color:var(--text-muted);">
                User ID: <strong id="balance-user-id" style="color:var(--text-primary);">—</strong>
            </div>
        </div>
    </div>

    <div class="action-bar" style="margin-top:2rem;">
        <a th:href="@{/payment-module}" class="btn-ghost">← Back to Module</a>
    </div>

</div>

<script th:inline="javascript">
    const userId = [[${userId}]];

    async function loadBalance() {
        const errorBox = document.getElementById('alert-error');
        try {
            const resp = await fetch('/api/v1/wallets/' + userId + '/balance');
            const data = await resp.json();
            document.getElementById('loading').style.display = 'none';

            if (!resp.ok) {
                showError(errorBox, data.message || data.error || 'Failed to load balance.');
                return;
            }

            document.getElementById('total-balance').textContent = '₹' + parseFloat(data.balance||0).toFixed(2);
            document.getElementById('balance-user-id').textContent = data.userId ?? userId;
            document.getElementById('stat-box').style.display = 'block';

        } catch(e) {
            document.getElementById('loading').style.display = 'none';
            showError(errorBox, 'Network error — could not reach the server.');
        }
    }

    function showError(box, msg) {
        box.innerHTML = '<span class="alert-icon">⚠️</span><span>' + msg + '</span>';
        box.classList.add('show');
    }

    loadBalance();
</script>

</body>
</html>
