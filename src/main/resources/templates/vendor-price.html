<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Vendor Gold Price</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-5">

        <h1 class="text-dark fw-bold mb-4">

            Vendor Gold Price

        </h1>

        <h3 class="mb-3">

            Vendor:
            <span
                    th:text="${vendor.vendorName}"></span>

        </h3>

        <h4 class="mb-3">

            Gold Price:
            ₹
            <span
                    th:text="${vendor.currentGoldPrice}"></span>

        </h4>

        <h5 class="mb-4">

            Total Gold Quantity:
            <span
                    th:text="${vendor.totalGoldQuantity}"></span>

        </h5>

        <a
                th:href="@{/vendor-module}"
                class="btn btn-secondary">

            Back

        </a>

    </div>

</div>

</body>

</html>
