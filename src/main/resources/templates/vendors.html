<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Vendors — Digital Gold Wallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="dgw-navbar">
    <a th:href="@{/}" class="dgw-navbar-brand">
        <div class="brand-icon">🪙</div>
        <div class="brand-name">Digital <span>Gold</span> Wallet</div>
    </a>
    <div class="dgw-navbar-right">
        <a th:href="@{/vendor-module}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">← Vendor Module</a>
        <a th:href="@{/logout}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">Sign Out</a>
    </div>
</nav>

<div class="dgw-page">

    <div class="dgw-breadcrumb">
        <a th:href="@{/}">Home</a><span class="sep">›</span>
        <a th:href="@{/vendor-module}">Vendor Module</a><span class="sep">›</span>
        <span class="current">All Vendors</span>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:2rem; flex-wrap:wrap; gap:1rem;">
        <div>
            <h1 class="page-title" style="font-size:2rem;margin-bottom:0.25rem;">All Vendors</h1>
            <p class="page-subtitle">
                <span class="method-badge method-GET" style="display:inline-flex;">GET</span>
                &nbsp;/api/v1/vendors
            </p>
        </div>
        <a th:href="@{/vendors/create}" class="btn-gold">
            + Create Vendor
        </a>
    </div>

    <div class="dgw-card" style="padding:0;overflow:hidden;">
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Vendor Name</th>
                    <th>Contact</th>
                    <th>Gold Quantity (g)</th>
                    <th>Gold Price</th>
                    <th style="text-align:right;">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="vendor : ${vendors}">
                    <td th:text="${vendor.vendorId}"></td>
                    <td th:text="${vendor.vendorName}" style="font-weight:600;color:var(--text-primary);"></td>
                    <td th:text="${vendor.contactEmail}"></td>
                    <td th:text="${vendor.totalGoldQuantity + 'g'}" style="color:var(--accent-gold);font-weight:700;"></td>
                    <td th:text="${'₹' + vendor.currentGoldPrice}" style="color:var(--accent-vendor);font-weight:700;"></td>
                    <td style="text-align:right; white-space:nowrap;">
                        <a th:href="@{/vendors/view/{id}(id=${vendor.vendorId})}" class="btn-ghost" style="padding:0.4rem 0.75rem;font-size:0.75rem;">View</a>
                        <a th:href="@{/vendors/update/{id}(id=${vendor.vendorId})}" class="btn-ghost" style="padding:0.4rem 0.75rem;font-size:0.75rem;border-color:rgba(212,175,55,0.4);color:var(--accent-vendor);">Edit</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(vendors)}">
                    <td colspan="6" style="text-align:center;padding:3rem;color:var(--text-muted);">
                        No vendors found in the system.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
