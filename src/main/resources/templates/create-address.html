<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Address — Digital Gold Wallet</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="dgw-navbar">
    <a th:href="@{/}" class="dgw-navbar-brand">
        <div class="brand-icon">🪙</div>
        <div class="brand-name">Digital <span>Gold</span> Wallet</div>
    </a>
    <div class="dgw-navbar-right">
        <a th:href="@{/user-module}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">← User Module</a>
        <a th:href="@{/logout}" class="btn-ghost" style="padding:0.45rem 1rem;font-size:0.82rem;">Sign Out</a>
    </div>
</nav>

<div class="dgw-page" style="max-width:640px;">

    <div class="dgw-breadcrumb">
        <a th:href="@{/}">Home</a><span class="sep">›</span>
        <a th:href="@{/user-module}">User Module</a><span class="sep">›</span>
        <span class="current">Create Address</span>
    </div>

    <h1 class="page-title" style="font-size:2rem;margin-bottom:0.25rem;">Create Address</h1>
    <p class="page-subtitle" style="margin-bottom:2rem;">
        <span class="method-badge method-POST" style="display:inline-flex;">POST</span>
        &nbsp;/api/v1/addresses
    </p>

    <div class="dgw-card">

        <div id="alert-error" class="alert-box alert-error" style="margin-bottom:1.25rem;"></div>

        <form id="create-address-form" class="dgw-form" onsubmit="submitCreateAddress(event)">

            <div class="form-group">
                <label class="form-label" for="street">Street *</label>
                <input type="text" id="street" class="form-control" placeholder="123 Main St" maxlength="150" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="city">City *</label>
                <input type="text" id="city" class="form-control" placeholder="Mumbai" maxlength="100" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="state">State *</label>
                <input type="text" id="state" class="form-control" placeholder="Maharashtra" maxlength="100" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="postalCode">Postal Code *</label>
                <input type="text" id="postalCode" class="form-control" placeholder="400001" minlength="3" maxlength="11" pattern="^[A-Za-z0-9\- ]+$" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="country">Country *</label>
                <input type="text" id="country" class="form-control" placeholder="India" maxlength="100" required>
            </div>

            <div class="action-bar" style="margin-top:0;">
                <button type="submit" class="btn-gold" style="background:var(--accent-user);color:#fff;">
                    <span id="btn-text">Create Address</span>
                    <span class="spinner" id="spinner"></span>
                </button>
                <a th:href="@{/user-module}" class="btn-ghost">Cancel</a>
            </div>

        </form>

        <div id="result-container" class="result-container" style="margin-top:2rem;">
            <h3 style="font-size:1rem;font-weight:700;color:#3ecf8e;margin-bottom:1rem;">
                ✓ Address Created Successfully
            </h3>
            <div class="result-card">
                <div class="result-row">
                    <span class="result-label">Address ID</span>
                    <span class="result-value" id="r-addressId" style="font-weight:700;">—</span>
                </div>
                <div class="result-row">
                    <span class="result-label">Street</span>
                    <span class="result-value" id="r-street">—</span>
                </div>
                <div class="result-row">
                    <span class="result-label">City</span>
                    <span class="result-value" id="r-city">—</span>
                </div>
            </div>
            <div style="margin-top:1.5rem;">
                <a th:href="@{/user-module}" class="btn-ghost" style="width:100%;justify-content:center;">Go to User Module →</a>
            </div>
        </div>

    </div>

</div>

<script>
async function submitCreateAddress(e) {
    e.preventDefault();
    const errorBox  = document.getElementById('alert-error');
    const resultBox = document.getElementById('result-container');
    const spinner   = document.getElementById('spinner');
    const btnText   = document.getElementById('btn-text');

    errorBox.classList.remove('show');
    resultBox.classList.remove('show');
    spinner.classList.add('show');
    btnText.textContent = 'Processing…';

    const payload = {
        street: document.getElementById('street').value,
        city: document.getElementById('city').value,
        state: document.getElementById('state').value,
        postalCode: document.getElementById('postalCode').value,
        country: document.getElementById('country').value
    };

    try {
        const resp = await fetch('/api/v1/addresses', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await resp.json();
        if (!resp.ok) {
            let msg = data.message || data.error || 'Failed to create address.';
            if (data.errors && typeof data.errors === 'object') {
                msg = Object.values(data.errors).join(', ');
            }
            showError(errorBox, msg);
        } else {
            document.getElementById('r-addressId').textContent = data.addressId ?? '—';
            document.getElementById('r-street').textContent   = data.street ?? '—';
            document.getElementById('r-city').textContent  = data.city ?? '—';
            resultBox.classList.add('show');
            document.getElementById('create-address-form').style.display = 'none';
        }
    } catch(err) {
        showError(errorBox, 'Network error — could not reach the server.');
    } finally {
        spinner.classList.remove('show');
        btnText.textContent = 'Create Address';
    }
}

function showError(box, msg) {
    box.innerHTML = '<span class="alert-icon">⚠️</span><span>' + msg + '</span>';
    box.classList.add('show');
}
</script>

</body>
</html>
