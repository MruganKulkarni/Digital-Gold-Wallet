<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Create Address</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow-lg p-5">

                <h1 class="text-success text-center mb-4">

                    Create Address

                </h1>

                <form
                        th:action="@{/users/addresses/save}"
                        th:object="${address}"
                        method="post">

                    <div class="mb-3">

                        <label class="form-label">

                            Street

                        </label>

                        <input
                                type="text"
                                th:field="*{street}"
                                class="form-control"
                                required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            City

                        </label>

                        <input
                                type="text"
                                th:field="*{city}"
                                class="form-control"
                                required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            State

                        </label>

                        <input
                                type="text"
                                th:field="*{state}"
                                class="form-control"
                                required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Postal Code

                        </label>

                        <input
                                type="text"
                                th:field="*{postalCode}"
                                class="form-control"
                                required>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">

                            Country

                        </label>

                        <input
                                type="text"
                                th:field="*{country}"
                                class="form-control"
                                required>

                    </div>

                    <div class="d-grid">

                        <button
                                type="submit"
                                class="btn btn-success btn-lg">

                            Save Address

                        </button>

                    </div>

                </form>

                <div class="text-center mt-4">

                    <a
                            th:href="@{/user-module}"
                            class="btn btn-secondary">

                        Back

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
