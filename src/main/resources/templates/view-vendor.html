<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>View Vendor</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg p-5">

        <h1 class="text-success fw-bold mb-5">

            Vendor Details

        </h1>



        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                Vendor ID:

            </div>

            <div class="col-md-8"
                 th:text="${vendor.vendorId}">

            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                Vendor Name:

            </div>

            <div class="col-md-8"
                 th:text="${vendor.vendorName}">

            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                Description:

            </div>

            <div class="col-md-8"
                 th:text="${vendor.description}">

            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                Contact Person:

            </div>

            <div class="col-md-8"
                 th:text="${vendor.contactPersonName}">

            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                Contact Email:

            </div>

            <div class="col-md-8"
                 th:text="${vendor.contactEmail}">

            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                Contact Phone:

            </div>

            <div class="col-md-8"
                 th:text="${vendor.contactPhone}">

            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                Website URL:

            </div>

            <div class="col-md-8"
                 th:text="${vendor.websiteUrl}">

            </div>

        </div>

        <div class="row mb-3">

            <div class="col-md-4 fw-bold">

                Total Gold Quantity:

            </div>

            <div class="col-md-8"
                 th:text="${vendor.totalGoldQuantity}">

            </div>

        </div>

        <div class="row mb-4">

            <div class="col-md-4 fw-bold">

                Current Gold Price:

            </div>

            <div class="col-md-8"
                 th:text="${vendor.currentGoldPrice}">

            </div>

        </div>

        <a
                th:href="@{/vendor-module}"

                class="btn btn-secondary">

            Back

        </a>

    </div>

</div>

</body>

</html>
